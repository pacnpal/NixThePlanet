name: Repeatability

# Builds the *-repeatability-test linkfarms (each is 100 copies of an
# image derivation with mutated names) on a matching-arch runner, then
# hashes the resulting .img payloads. The linkFarm build forces all 100
# realizations to happen; the explicit hash comparison below then fails
# if those payloads differ.
#
# This is intentionally separate from build-images.yml because:
#   - it is much slower (100x the work)
#   - a single non-deterministic build does not block image publishing
#   - we only need it weekly, not on every push
#
on:
  workflow_dispatch:
  schedule:
    # Sunday at 03:33 UTC. Once a week is plenty.
    - cron: '33 3 * * 0'

permissions:
  contents: read

jobs:
  repeatability:
    if: github.repository == 'pacnpal/NixThePlanet'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Only the cheapest two images are worth doing 100x of in
          # CI. wfwg311 and win98 would blow the 6h runner limit.
          - system: x86_64-linux
            runner: ubuntu-24.04
            image: msDos622
          - system: x86_64-linux
            runner: ubuntu-24.04
            image: win30
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
            image: msDos622
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
            image: win30
    runs-on: ${{ matrix.runner }}
    # 6h is the hard runner cap. The repeatability builds are
    # serialized inside one derivation graph so this is the budget for
    # the whole 100-copy run.
    timeout-minutes: 350
    name: ${{ matrix.image }}-repeatability (${{ matrix.system }})
    steps:
      - name: Check Cachix configuration
        id: cachix
        shell: bash
        run: |
          if [ -n "${{ secrets.CACHIX_AUTH_TOKEN }}" ] && [ -n "${{ secrets.CACHIX_SIGNING_KEY }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Cachix secrets are not configured; skipping repeatability builds."
          fi

      - uses: actions/checkout@v4
        if: steps.cachix.outputs.enabled == 'true'

      - uses: cachix/install-nix-action@v31
        if: steps.cachix.outputs.enabled == 'true'
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: cachix/cachix-action@v17
        if: steps.cachix.outputs.enabled == 'true'
        with:
          name: nixtheplanet
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          signingKey: ${{ secrets.CACHIX_SIGNING_KEY }}

      - name: Build and compare ${{ matrix.image }}-repeatability-test
        if: steps.cachix.outputs.enabled == 'true'
        env:
          ATTR: .#packages.${{ matrix.system }}.${{ matrix.image }}-repeatability-test
          EXPECTED_COUNT: 100
        run: |
          set -euo pipefail
          nix build "$ATTR" --print-build-logs
          out="$(nix path-info "$ATTR")"

          count="$(find "$out" -mindepth 1 -maxdepth 1 -type l | wc -l)"
          if [ "$count" -ne "$EXPECTED_COUNT" ]; then
            echo "Expected ${EXPECTED_COUNT} repeated outputs, found ${count}."
            exit 1
          fi

          mapfile -t unique_hashes < <(
            find "$out" -mindepth 1 -maxdepth 1 -type l -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | awk '{ print $1 }' \
              | sort -u
          )

          if [ "${#unique_hashes[@]}" -ne 1 ]; then
            echo "Repeatability check failed: found ${#unique_hashes[@]} distinct image hashes."
            find "$out" -mindepth 1 -maxdepth 1 -type l -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | sort
            exit 1
          fi

          echo "Repeatability check passed with hash ${unique_hashes[0]}."
